<div class="container-fluid py-4">

  <!-- Page Header -->
  <div class="d-flex justify-content-center align-items-center mb-4">
    <h2 class="mb-0">User Management</h2>
    
    
  </div>


      <div class="d-flex justify-content-center align-items-center mb-4">
    <button class="btn btn-primary" (click)="openAddModal()">
      <i class="bi bi-plus-lg me-1"></i> Add User
    </button>
  </div>

  <!-- Search Bar & Page Size -->
  <div class="row mb-3">
    <div class="col-md-6 col-lg-8 text-md-start mt-2 mt-md-0">
      <label class="me-2">Page Size:</label>
      <select
        class="form-select d-inline-block w-auto"
        [(ngModel)]="pageSize"
        (ngModelChange)="onPageSizeChange()">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
      </select>
    </div>
    <div class="col-md-6 col-lg-4">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input
          type="text"
          class="form-control"
          placeholder="Search by name, email, contact or address..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
          (input)="onSearch()">
        <button
          class="btn btn-outline-secondary"
          type="button"
          (click)="clearSearch()"
          *ngIf="searchTerm">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
    
  </div>

  <!-- Loading Spinner -->
  <div class="text-center py-5" *ngIf="isLoading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2 text-muted">Loading users...</p>
  </div>

  <!-- Error Message -->
  <div class="alert alert-danger" *ngIf="errorMessage && !isLoading">
    {{ errorMessage }}
    <button class="btn btn-sm btn-outline-danger ms-2" (click)="loadUsers()">Retry</button>
  </div>

  <!-- User Table -->
  <div class="table-responsive" *ngIf="!isLoading && !errorMessage">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>





          <th style="cursor: pointer" (click)="toggleSort('id')" class="sortable-th">
            #
            <i class="bi ms-1" [ngClass]="getSortIcon('id')"></i>
          </th>





          
          <th style="cursor: pointer" (click)="toggleSort('name')" class="sortable-th">
            Name
            <i class="bi ms-1" [ngClass]="getSortIcon('name')"></i>
          </th>
          <th style="cursor: pointer" (click)="toggleSort('email')" class="sortable-th">
            Email
            <i class="bi ms-1" [ngClass]="getSortIcon('email')"></i>
          </th>
          <th style="cursor: pointer" (click)="toggleSort('contact')" class="sortable-th">
            Contact
            <i class="bi ms-1" [ngClass]="getSortIcon('contact')"></i>
          </th>
          <th style="cursor: pointer" (click)="toggleSort('address')" class="sortable-th">
            Address
            <i class="bi ms-1" [ngClass]="getSortIcon('address')"></i>
          </th>
          <th class="text-center" style="min-width: 150px">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of paginatedUsers ;let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.contact }}</td>
          <td>{{ user.address }}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-warning me-2" (click)="openEditModal(user)">
              <i class="bi bi-pencil-square me-1"></i>Edit
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteUser(user)">
              <i class="bi bi-trash me-1"></i>Delete
            </button>
          </td>
        </tr>
        <!-- Empty state -->
        <tr *ngIf="paginatedUsers.length === 0">
          <td colspan="6" class="text-center py-4 text-muted">
            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
            No users found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Footer -->
  <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="!isLoading && !errorMessage">
    <div class="text-muted">{{ showingText }}</div>
    <nav aria-label="Page navigation">
      <ul class="pagination mb-0">
        <!-- Previous -->
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" href="javascript:void(0)" (click)="goToPreviousPage()">Previous</a>
        </li>

        <!-- Page numbers -->
        <li
          class="page-item"
          *ngFor="let page of pageNumbers"
          [class.active]="page === currentPage"
          [class.disabled]="page === '...'">
          <a
            class="page-link"
            href="javascript:void(0)"
            (click)="page !== '...' && goToPage(page)"
            [class.text-muted]="page === '...'">
            {{ page }}
          </a>
        </li>

        <!-- Next -->
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" href="javascript:void(0)" (click)="goToNextPage()">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</div>



<!-- Add/Edit User Modal -->
<app-user-modal
  *ngIf="showModal"
  [user]="selectedUser"
  [isSaving]="isSaving"
  (save)="onSaveUser($event)"
  (close)="hideBootstrapModal()">
</app-user-modal>
